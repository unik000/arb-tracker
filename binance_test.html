<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Binance Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; padding: 40px; }
  h1 { font-size: 18px; margin-bottom: 24px; color: #94a3b8; }
  .block { background: #1e2130; border: 1px solid #2d3348; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .label { font-size: 12px; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .price { font-size: 36px; font-weight: 600; color: #22c55e; }
  .status { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 8px; }
  .status.ok { background: #0f2918; color: #22c55e; }
  .status.err { background: #2a1a1a; color: #ef4444; }
  .status.wait { background: #1e2130; color: #64748b; }
  .log { font-size: 12px; color: #475569; margin-top: 16px; line-height: 1.8; }
</style>
</head>
<body>

<h1>Тест подключения к Binance</h1>

<div class="block">
  <div class="label">SPCX/USDT — Binance Futures (mark price)</div>
  <div class="price" id="price1">—</div>
  <div class="status wait" id="status1">⏳ Подключение...</div>
</div>

<div class="block">
  <div class="label">SPCX/USDT — Binance Futures (ticker)</div>
  <div class="price" id="price2">—</div>
  <div class="status wait" id="status2">⏳ Подключение...</div>
</div>

<div class="block">
  <div class="label">SPCX/USDT — Binance Spot</div>
  <div class="price" id="price3">—</div>
  <div class="status wait" id="status3">⏳ Подключение...</div>
</div>

<div class="log" id="log"></div>

<script>
function log(msg) {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString('ru-RU');
  el.innerHTML += `[${time}] ${msg}<br>`;
}

// Тест 1 — markPrice
function test1() {
  log('Тест 1: подключаюсь к fstream.binance.com markPrice...');
  try {
    const ws = new WebSocket('wss://fstream.binance.com/ws/spcxusdt@markPrice@1s');
    ws.onopen = () => log('Тест 1: соединение открыто');
    ws.onmessage = e => {
      const d = JSON.parse(e.data);
      if (d.p) {
        document.getElementById('price1').textContent = '$' + parseFloat(d.p).toFixed(2);
        document.getElementById('status1').textContent = '✅ Работает!';
        document.getElementById('status1').className = 'status ok';
        log('Тест 1: получена цена ' + d.p);
      }
    };
    ws.onerror = e => { document.getElementById('status1').textContent = '❌ Ошибка подключения'; document.getElementById('status1').className = 'status err'; log('Тест 1: ошибка'); };
    ws.onclose = () => log('Тест 1: соединение закрыто');
  } catch(e) { log('Тест 1: исключение — ' + e.message); }
}

// Тест 2 — ticker
function test2() {
  log('Тест 2: подключаюсь к fstream.binance.com ticker...');
  try {
    const ws = new WebSocket('wss://fstream.binance.com/ws/spcxusdt@ticker');
    ws.onopen = () => log('Тест 2: соединение открыто');
    ws.onmessage = e => {
      const d = JSON.parse(e.data);
      if (d.c) {
        document.getElementById('price2').textContent = '$' + parseFloat(d.c).toFixed(2);
        document.getElementById('status2').textContent = '✅ Работает!';
        document.getElementById('status2').className = 'status ok';
        log('Тест 2: получена цена ' + d.c);
      }
    };
    ws.onerror = e => { document.getElementById('status2').textContent = '❌ Ошибка подключения'; document.getElementById('status2').className = 'status err'; log('Тест 2: ошибка'); };
    ws.onclose = () => log('Тест 2: соединение закрыто');
  } catch(e) { log('Тест 2: исключение — ' + e.message); }
}

// Тест 3 — spot
function test3() {
  log('Тест 3: подключаюсь к stream.binance.com спот...');
  try {
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/spcxusdt@ticker');
    ws.onopen = () => log('Тест 3: соединение открыто');
    ws.onmessage = e => {
      const d = JSON.parse(e.data);
      if (d.c) {
        document.getElementById('price3').textContent = '$' + parseFloat(d.c).toFixed(2);
        document.getElementById('status3').textContent = '✅ Работает!';
        document.getElementById('status3').className = 'status ok';
        log('Тест 3: получена цена ' + d.c);
      }
    };
    ws.onerror = e => { document.getElementById('status3').textContent = '❌ Ошибка подключения'; document.getElementById('status3').className = 'status err'; log('Тест 3: ошибка'); };
    ws.onclose = () => log('Тест 3: соединение закрыто');
  } catch(e) { log('Тест 3: исключение — ' + e.message); }
}

setTimeout(test1, 500);
setTimeout(test2, 1000);
setTimeout(test3, 1500);
</script>
</body>
</html>
