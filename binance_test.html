<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Binance Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; padding: 40px; }
  h1 { font-size: 18px; margin-bottom: 24px; color: #94a3b8; }
  .block { background: #1e2130; border: 1px solid #2d3348; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .label { font-size: 12px; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .price { font-size: 36px; font-weight: 600; color: #22c55e; }
  .status { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 8px; }
  .status.ok { background: #0f2918; color: #22c55e; }
  .status.err { background: #2a1a1a; color: #ef4444; }
  .status.wait { background: #1e2130; color: #64748b; }
  .log { font-size: 12px; color: #475569; margin-top: 16px; line-height: 1.8; font-family: monospace; }
</style>
</head>
<body>

<h1>Тест Binance WebSocket</h1>

<div class="block">
  <div class="label">Binance Futures — SPCXUSDT (фьюч)</div>
  <div class="price" id="price1">—</div>
  <div class="status wait" id="status1">⏳ Подключение...</div>
</div>

<div class="block">
  <div class="label">Binance Spot — SPCXBUSDT (спот)</div>
  <div class="price" id="price2">—</div>
  <div class="status wait" id="status2">⏳ Подключение...</div>
</div>

<div class="log" id="log"></div>

<script>
function log(msg) {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString('ru-RU');
  el.innerHTML += `[${time}] ${msg}<br>`;
}

function test1() {
  log('Фьюч SPCXUSDT — подключаюсь...');
  const ws = new WebSocket('wss://fstream.binance.com/ws/spcxusdt@markPrice@1s');
  ws.onopen = () => log('Фьюч: соединение открыто, жду данные...');
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    log('Фьюч: данные → ' + JSON.stringify(d).substring(0, 120));
    const price = d.p || d.c;
    if (price) {
      document.getElementById('price1').textContent = '$' + parseFloat(price).toFixed(2);
      document.getElementById('status1').textContent = '✅ Работает!';
      document.getElementById('status1').className = 'status ok';
    }
  };
  ws.onerror = () => { document.getElementById('status1').className = 'status err'; document.getElementById('status1').textContent = '❌ Ошибка'; log('Фьюч: ошибка WebSocket'); };
  ws.onclose = e => log('Фьюч: закрыто, код=' + e.code + ' причина=' + (e.reason || 'нет'));
}

function test2() {
  log('Спот SPCXBUSDT — подключаюсь...');
  const ws = new WebSocket('wss://stream.binance.com:9443/ws/spcxbusdt@ticker');
  ws.onopen = () => log('Спот: соединение открыто, жду данные...');
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    log('Спот: данные → ' + JSON.stringify(d).substring(0, 120));
    const price = d.c;
    if (price) {
      document.getElementById('price2').textContent = '$' + parseFloat(price).toFixed(2);
      document.getElementById('status2').textContent = '✅ Работает!';
      document.getElementById('status2').className = 'status ok';
    }
  };
  ws.onerror = () => { document.getElementById('status2').className = 'status err'; document.getElementById('status2').textContent = '❌ Ошибка'; log('Спот: ошибка WebSocket'); };
  ws.onclose = e => log('Спот: закрыто, код=' + e.code + ' причина=' + (e.reason || 'нет'));
}

setTimeout(test1, 500);
setTimeout(test2, 1000);
</script>
</body>
</html>
