<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Binance Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; padding: 40px; }
  h1 { font-size: 18px; margin-bottom: 24px; color: #94a3b8; }
  .block { background: #1e2130; border: 1px solid #2d3348; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .label { font-size: 12px; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .price { font-size: 36px; font-weight: 600; color: #22c55e; }
  .status { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 8px; }
  .status.ok { background: #0f2918; color: #22c55e; }
  .status.err { background: #2a1a1a; color: #ef4444; }
  .status.wait { background: #1e2130; color: #64748b; }
  .log { font-size: 12px; color: #475569; margin-top: 16px; line-height: 1.8; font-family: monospace; }
</style>
</head>
<body>

<h1>Тест Binance — REST запросы</h1>

<div class="block">
  <div class="label">Binance Futures SPCXUSDT — REST каждые 3 сек</div>
  <div class="price" id="price1">—</div>
  <div class="status wait" id="status1">⏳ Запрос...</div>
</div>

<div class="block">
  <div class="label">Binance Spot SPCXBUSDT — REST каждые 3 сек</div>
  <div class="price" id="price2">$203.36 ✅ уже работает через WS</div>
  <div class="status ok" id="status2">✅ WS работает</div>
</div>

<div class="log" id="log"></div>

<script>
function log(msg) {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString('ru-RU');
  el.innerHTML += `[${time}] ${msg}<br>`;
}

// REST запрос к Binance Futures
async function fetchFutures() {
  try {
    const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/price?symbol=SPCXUSDT');
    const d = await res.json();
    log('Фьюч REST: ' + JSON.stringify(d));
    if (d.price) {
      document.getElementById('price1').textContent = '$' + parseFloat(d.price).toFixed(2);
      document.getElementById('status1').textContent = '✅ REST работает!';
      document.getElementById('status1').className = 'status ok';
    }
  } catch(e) {
    log('Фьюч REST ошибка: ' + e.message);
    document.getElementById('status1').textContent = '❌ REST не работает: ' + e.message;
    document.getElementById('status1').className = 'status err';
  }
}

// Спот через WS (уже работает)
function connectSpotWS() {
  const ws = new WebSocket('wss://stream.binance.com:9443/ws/spcxbusdt@ticker');
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.c) {
      document.getElementById('price2').textContent = '$' + parseFloat(d.c).toFixed(2);
    }
  };
  ws.onclose = () => setTimeout(connectSpotWS, 3000);
}

fetchFutures();
setInterval(fetchFutures, 3000);
connectSpotWS();
</script>
</body>
</html>
